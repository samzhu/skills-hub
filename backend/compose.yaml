services:
  pgvector:
    image: 'pgvector/pgvector:pg16'
    environment:
      POSTGRES_DB: mydatabase
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: secret
    ports:
      - '5432:5432'
    labels:
      org.springframework.boot.service-connection: 'postgres'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U myuser -d mydatabase']
      interval: 5s
      timeout: 2s
      retries: 10

  mock-oauth2-server:
    image: 'ghcr.io/navikt/mock-oauth2-server:3.0.1'
    ports:
      - '9000:8080'
    volumes:
      - './config/oauth-mock-config.json:/app/config.json:ro'
    environment:
      JSON_CONFIG_PATH: /app/config.json
      LOG_LEVEL: INFO
    healthcheck:
      # navikt/mock-oauth2-server:3.0.1 不支援 HEAD（spider 模式收 404）；改用 GET + 丟棄 body。
      # 用 -q 抑制 wget 進度輸出，-O - 寫到 stdout 然後 redirect 至 /dev/null。
      test: ['CMD-SHELL', 'wget -q -O - http://localhost:8080/skills-hub-dev/.well-known/openid-configuration > /dev/null']
      interval: 5s
      timeout: 2s
      retries: 10
      start_period: 5s
    labels:
      org.springframework.boot.ignore: 'true'


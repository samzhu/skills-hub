services:
  pgvector:
    image: 'pgvector/pgvector:pg16'
    environment:
      POSTGRES_DB: mydatabase
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: secret
    ports:
      - '5432:5432'
    # S093: named volume 持久化 dev DB；配合 application-local.yaml `lifecycle-management: start-only`，
    # backend stop 後 compose 不被 down，container 與 volume 都跨 session 留存。
    # 即使 user 手動 `docker compose down`（不加 -v）容器消失，named volume 仍存活，重新 up
    # 即接回既有資料。Anonymous volume（pgvector image 預設 VOLUME 宣告）在無此 mount 時每次
    # `docker compose up` 都建新 instance → 舊資料變 dangling，dev 體驗等同 fresh DB。
    volumes:
      - 'pgvector-data:/var/lib/postgresql/data'
    labels:
      org.springframework.boot.service-connection: 'postgres'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U myuser -d mydatabase']
      interval: 5s
      timeout: 2s
      retries: 10

  mock-oauth2-server:
    image: 'ghcr.io/navikt/mock-oauth2-server:3.0.1'
    ports:
      - '9000:8080'
    volumes:
      - './config/oauth-mock-config.json:/app/config.json:ro'
    environment:
      JSON_CONFIG_PATH: /app/config.json
      LOG_LEVEL: INFO
    healthcheck:
      # navikt/mock-oauth2-server:3.0.1 不支援 HEAD（spider 模式收 404）；改用 GET + 丟棄 body。
      # 用 -q 抑制 wget 進度輸出，-O - 寫到 stdout 然後 redirect 至 /dev/null。
      test: ['CMD-SHELL', 'wget -q -O - http://localhost:8080/skills-hub-dev/.well-known/openid-configuration > /dev/null']
      interval: 5s
      timeout: 2s
      retries: 10
      start_period: 5s
    labels:
      org.springframework.boot.ignore: 'true'

  # grafana-lgtm:
  #   image: 'grafana/otel-lgtm:latest'
  #   ports:
  #     - '3000:3000'
  #     - '4317'
  #     - '4318'

# S093: 顯式宣告 named volume — 不指定 driver / 路徑，Docker 預設用 local driver 自動 manage 路徑。
# 名稱會帶 compose project prefix（通常 `backend_pgvector-data`），跨 session 唯一。
volumes:
  pgvector-data:

# =============================================================================
# AOT 編譯 + Paketo Training Run 專用配置
# =============================================================================
# Profile: aot
# 用途：
#   - Spring Boot processAot Gradle task（build-time AOT artifacts）
#   - Paketo BP_JVM_AOTCACHE_ENABLED=true 觸發的 training run（build-time class loading）
#
# **不要在 runtime 啟用此 profile**。Cloud Run 部署用 SPRING_PROFILES_ACTIVE=gcp,prod
# 或 gcp,lab 蓋掉，aot profile 永不在 runtime active。
#
# 主要 stub 邏輯在 Java config（不放這裡是因 Spring Boot 4 AOT processing 不跑
# @ConfigurationProperties binding，profile yaml override 不生效）：
#   - DataSource bean → src/main/java/.../shared/aot/AotStubConfig.java（@Profile("aot")）
#   - JdbcDialect → JdbcConfiguration.jdbcDialect() override（永久生效，避開 connection
#                   metadata 偵測查詢；100% PostgreSQL 不需 auto-detect）
#
# 本 yaml 只放 Java config 解不掉的開關（plugin / auto-config 排除）。
# =============================================================================

spring:
  # S133：不再 disable Flyway autoconfig — 改用 FlywayMigrationStrategy bean 在 AOT 階段
  # skip migrate (per AotStubConfig)。autoconfig disabled 會 leak 到 native runtime（baked
  # context 沒 Flyway beans，env var SPRING_FLYWAY_ENABLED=true 也救不回）。
  #
  # 不再 exclude GcpContextAutoConfiguration — Cloud Build 環境有 metadata server
  # （Cloud Build SA），原本假設「CI 沒 metadata server」是錯的。移除後 GcpProjectIdProvider
  # 能在 AOT 階段被 bake，下游 GcpStorageAutoConfiguration / Storage bean 才能滿足依賴。
  #
  # Modulith native excludes — spring-modulith-actuator/observability autoconfig 觸發
  # ApplicationModulesRuntime → ArchUnit ClassFileImporter → native image
  # ClassNotFoundException：ModuleImportPlugin (Issue #735/#1556 未修)。
  autoconfigure:
    exclude:
      - org.springframework.modulith.actuator.autoconfigure.ApplicationModulesEndpointConfiguration
      - org.springframework.modulith.observability.autoconfigure.ModuleObservabilityAutoConfiguration
      - org.springframework.modulith.observability.autoconfigure.SpringDataRestModuleObservabilityAutoConfiguration

  # ----- GCP autoconfig 在 AOT 階段的取捨（per gate/application-aot.yaml pattern）-----
  # 啟用 storage 讓 GcsStorageService 的 Storage 依賴 bean factory 在 AOT 階段被 bake；
  # secretmanager 在 AOT 階段不需要（沒 creds 也不該試呼 API），明確 disable。
  # ⚠ aot profile 會 leak 到 runtime（per AotStubConfig __ApplicationContextInitializer
  # .addActiveProfile("aot")），故 application-gcp.yaml 必須在 runtime 顯式 enable
  # secretmanager 才能 override 本檔。
  cloud:
    gcp:
      storage:
        enabled: true
      secretmanager:
        enabled: false

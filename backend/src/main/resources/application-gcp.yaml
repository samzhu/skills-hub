# =============================================================================
# GCP 基礎設施配置 — Cloud Run + Cloud SQL Auth Proxy sidecar + Secret Manager
# =============================================================================
# Profile: gcp
# 用途: GCP infra 層 — 只管「GCP autoconfig 開關 / 能力 register」。
#       env-specific 值（DB url/帳密、bucket、issuer-uri、api-key、pool-size、
#       llm.enabled 等）一律由 behavior profile (lab / prod) 提供。
#
# 建議組合（spring.profiles.active 值）：
#   lab,gcp   — 封測 / MVP，OAuth on，real IdP
#   prod,gcp  — 正式，OAuth on，real IdP，限縮 actuator
#
# 部署: scripts/gcp/04-deploy.sh + service.yaml — 詳見 scripts/gcp/DEPLOYMENT.md
# JDBC URL 結構: behavior profile 走 jdbc:postgresql://localhost:5432/...
#               （Cloud SQL Auth Proxy sidecar 在 localhost:5432 listen；ADR-001 §4.4 dev/prod parity）
# =============================================================================

spring:
  docker:
    compose:
      # Cloud Run 無 Docker Compose，停用避免啟動錯誤
      enabled: false

  cloud:
    gcp:
      storage:
        enabled: true
      # secretmanager 預設 enabled=true；project-id 從 ADC 自動推斷（runtime SA credentials），
      # 無需顯式設定。對應 IAM role：roles/secretmanager.secretAccessor（01-bootstrap.sh 已授權）

  # ----- spring-cloud-gcp-starter-secretmanager 啟用 sm@ resolver -----
  # 註冊 SecretManagerConfigDataLocationResolver；任何 yaml 內 ${sm@<secret-id>}
  # placeholder 在 startup 時自動拉 Secret Manager 對應 secret 最新版本值。
  # behavior profile (lab/prod) 即可在 datasource.password / genai.api-key 等位置使用。
  config:
    import: sm@

# =============================================================================
# GCP 基礎設施配置
# =============================================================================
# Profile: gcp
# 用途: 部署至 GCP Cloud Run，啟用 GCS（StorageService）與 Firestore native SDK（向量搜尋）。
#       GCP Application Default Credentials 由 Cloud Run Workload Identity 自動提供。
#       Embedding API key 由 env var SKILLSHUB_GENAI_API_KEY 注入（relaxed binding）。
# 啟動: SPRING_PROFILES_ACTIVE=gcp,prod
# =============================================================================

spring:
  docker:
    compose:
      # Cloud Run 無 Docker Compose，停用以避免啟動錯誤
      enabled: false

  cloud:
    gcp:
      storage:
        enabled: true
      firestore:
        enabled: true

# GCP 使用 Firestore 向量搜尋（覆蓋 application.yaml 的 simple 預設值）
skillshub:
  search:
    vector-store: firestore
  # GCP 部署啟用 LlmJudge（要求 SKILLSHUB_GENAI_API_KEY 同時提供，否則 bean 不建立）
  scanner:
    engines:
      llm:
        enabled: true

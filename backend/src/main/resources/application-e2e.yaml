# =============================================================================
# Skills Hub — E2E behavior profile (S140)
# =============================================================================
# Profile: e2e
# 用途：Playwright E2E 跑 critical-path test 時啟用。
#       1) 啟用 testsupport.TestDataController（fixture seeding endpoints）
#       2) 啟用 testsupport.E2EEmbeddingConfig（@Primary deterministic stub
#          EmbeddingModel；對齊 SkillshubProperties.GenAI.dimensions=768）
#
# 建議組合：local,e2e — 沿用 local Docker Compose 的 PostgreSQL + pgvector
# 與 FileSystemStorageService（@Profile("local")），不需 GCP 憑證；e2e 行為
# 層覆蓋 stub embedder。Cloud Build / production 不啟用此 profile（per S132
# §8 baked profile 機制），TestDataController + E2EEmbeddingConfig bean 完全
# 不存在 production binary。
# =============================================================================

skillshub:
  security:
    oauth:
      # S140-T05: e2e 走 LAB 模式（LabSecurityFilter 注入 lab-user with ROLE_admin），
      # Playwright 不需 storageState / OAuth round-trip — PublishPage 等 auth-gated
      # endpoint 直接通過。Production prod profile 不啟用 e2e profile，OAuth 仍 fail-secure。
      enabled: false
  scanner:
    engines:
      llm:
        # S168: e2e LlmJudge 真打 Gemini → 5-15s/scan + 偶發 quota/timeout，AC-3
        # publish 30s timeout 撐不過。e2e 只驗 pattern scanner happy path 即可
        # 達成 risk_level=NONE/LOW，LLM 質量留 LAB 部署驗證。
        enabled: false
  quality:
    judge:
      # S172-T06: Playwright e2e 不需要真打 Gemini quality judge；保留頁面流程穩定。
      enabled: false
  search:
    # S168: 配合 E2EEmbeddingConfig word-overlap stub 升級。Word-overlap doc cosine
    # ~0.2，純 noise pair cosine ~±0.05；threshold 0.1 篩出 keyword-match 但拒絕
    # 雜訊。AC-1「docker」→ 3 個 docker-* skill 命中（其他被 0.1 篩掉）；AC-5 改用
    # 英文 NL query 與 seed description 有 token overlap → ≥1 結果。Production 仍走預設 0.3。
    semantic-similarity-threshold: 0.1

logging:
  level:
    # E2E 跑批時 SQL TRUNCATE 等動作清晰可見；其他維持 base 預設 INFO
    io.github.samzhu.skillshub.skill.testsupport: DEBUG

# =============================================================================
# 本地開發基礎設施配置
# =============================================================================
# Profile: local
# 用途: 本機開發環境，使用 Docker Compose 啟動 pgvector/pgvector:pg16 與 mock-oauth2-server。
#       StorageService 實作：FileSystemStorageService（./storage-local/）
#       無需 GCP Application Default Credentials。
#       JDBC URL 與 GCP sidecar profile 同條（dev/prod parity；ADR-001 §4.4）：
#         jdbc:postgresql://localhost:5432/<db>
# =============================================================================

spring:
  docker:
    compose:
      enabled: true
      # S093: start-only — bootRun start 時拉 compose；bootRun stop 不 down container。
      # 配合 compose.yaml `pgvector-data` named volume 讓 dev DB 跨 session 持久。
      # 預設 start-and-stop 在 bootRun 結束時自動 `docker compose down`，每次重啟等同 fresh DB
      # （anonymous volume churn）。dev infra 偏好持久化以保留累積測試資料、validate 跨 session 行為。
      # 手動清理：`docker compose -f backend/compose.yaml down -v` 一次清掉容器與 named volume。
      lifecycle-management: start-only

  # ----- PostgreSQL 連線（與 gcp profile 同條 URL 結構）-----
  # 本機 Docker Compose pgvector 容器暴露 localhost:5432；
  # GCP Cloud Run 由 cloud-sql-proxy sidecar 也 listen localhost:5432。
  # 預設值對齊 backend/compose.yaml 的 POSTGRES_DB / POSTGRES_USER / POSTGRES_PASSWORD。
  datasource:
    url: jdbc:postgresql://localhost:5432/${SKILLSHUB_DB_NAME:mydatabase}
    username: ${SKILLSHUB_DB_USER:myuser}
    password: ${SKILLSHUB_DB_PASSWORD:secret}

  autoconfigure:
    # Profile YAML 覆蓋（非合併）base 的 exclude list，因此必須重複 base 的排除項。
    exclude:
      # base: Manual Configuration 取代 auto-config
      - org.springframework.ai.model.google.genai.autoconfigure.embedding.GoogleGenAiEmbeddingConnectionAutoConfiguration
      # local: 無 GCP 憑證，排除需要 GCP 憑證的 autoconfiguration
      - com.google.cloud.spring.autoconfigure.core.GcpContextAutoConfiguration

  cloud:
    gcp:
      # 本機無 GCP 憑證，停用 GCP 服務。改由 gcp profile 啟用。
      # T7 後 google-cloud-firestore dep 已移除，無需 firestore.enabled 設定。
      storage:
        enabled: false

# ----- S027: dev 模式 LAB security path -----
# 本機開發跳過 OAuth Resource Server JWT 要求；SecurityConfig.filterChain 走 LAB 分支：
#   - anyRequest permitAll
#   - LabSecurityFilter 注入 lab-user with ROLE_admin authority
# 配合 DelegatingPermissionEvaluator 對 ROLE_admin 的短路 bypass（per S027 §2.2），
# 所有 @PreAuthorize ACL gate 在 dev 自動通過，無需手動 JWT。
# Prod (gcp profile) 預設 oauth.enabled=true（base application.yaml line 137），不受影響。
skillshub:
  security:
    oauth:
      enabled: false

# ----- S099a / S100：local 啟用 OpenAPI 3.1 spec + Swagger UI -----
# Base application.yaml 預設 disabled (production 不該暴露 spec)。Local profile 啟用方便
# 開發時 quick reference + RestApiPage docs 連結 /v3/api-docs 與 /swagger-ui.html。
# `version: openapi_3_1` — SpringDoc 3.x（Swagger Core 2.2.22+）explicit 產 OpenAPI 3.1.0
# spec（vs 預設 3.0.3）；JSON schema 對齊 latest standard。
springdoc:
  api-docs:
    enabled: true
    version: openapi_3_1
  swagger-ui:
    enabled: true

# =============================================================================
# 本地開發基礎設施配置
# =============================================================================
# Profile: local
# 用途: 本機開發環境，使用 Docker Compose 啟動 MongoDB 與 Grafana LGTM。
#       StorageService 實作：FileSystemStorageService（./storage-local/）
#       無需 GCP Application Default Credentials。
# =============================================================================

spring:
  docker:
    compose:
      enabled: true
      lifecycle-management: start-and-stop

  autoconfigure:
    # 本機無 GCP 憑證，排除需要 GCP 憑證的 autoconfiguration 以避免啟動失敗。
    # GCP 服務（GCS / Firestore）改由 gcp profile 啟用，不在 local profile 使用。
    exclude:
      - com.google.cloud.spring.autoconfigure.core.GcpContextAutoConfiguration
      # 注意：GoogleGenAiEmbeddingConnectionAutoConfiguration 不在此排除。
      # 改以 placeholder api-key（GOOGLE_GENAI_API_KEY 預設值 DISABLED）讓該 bean 建立但不實際呼叫。
      # 當 api-key = "DISABLED" 且 spring.ai.model.embedding.text = none 時，
      # GoogleGenAiTextEmbeddingAutoConfiguration 不建立 text embedding bean，
      # SearchConfig.noOpEmbeddingModel() 接管（ConditionalOnMissingBean）。

  ai:
    google:
      genai:
        embedding:
          # API key 從 config/application-secrets.properties 注入（gitignored）。
          # 未設定時使用 "DISABLED" 作為 placeholder，使 ConnectionAutoConfiguration 正常啟動
          # 但不實際發出 API 呼叫（text embedding model 由 noOpEmbeddingModel 取代）。
          # 設定方式：在 config/application-secrets.properties 加入
          #   GOOGLE_GENAI_API_KEY=AIzaSy...
          #   spring.ai.model.embedding.text=google-genai
          api-key: ${GOOGLE_GENAI_API_KEY:DISABLED}
          text:
            options:
              model: gemini-embedding-2
              dimensions: 768
    model:
      # 預設 none — 使用 NoOpEmbeddingModel（語意搜尋停用，其餘功能正常）。
      # 在 config/application-secrets.properties 加入
      #   spring.ai.model.embedding.text=google-genai
      # 可切換至真實 Google GenAI EmbeddingModel。
      embedding:
        text: none

  cloud:
    gcp:
      # 本機無 GCP 憑證，停用所有 GCP autoconfiguration 以避免啟動失敗。
      # GCP 服務（GCS / Firestore native SDK）改由 gcp profile 啟用。
      storage:
        enabled: false
      firestore:
        enabled: false

# =============================================================================
# 本地開發基礎設施配置
# =============================================================================
# Profile: local
# 用途: 本機開發環境，使用 Docker Compose 啟動 MongoDB 與 Grafana LGTM。
#       StorageService 實作：FileSystemStorageService（./storage-local/）
#       無需 GCP Application Default Credentials。
# =============================================================================

spring:
  docker:
    compose:
      enabled: true
      lifecycle-management: start-and-stop

  autoconfigure:
    # 本機無 GCP 憑證，排除 GCP 核心 context autoconfiguration 以避免 WARN：
    # "No core credentials are set" / "Your default credentials were not found"
    # GCP 服務（GCS / Firestore）改由 gcp profile 啟用，不在 local profile 使用。
    exclude:
      - com.google.cloud.spring.autoconfigure.core.GcpContextAutoConfiguration

  ai:
    model:
      # 本機無 GCP 憑證，禁用 Spring AI Google GenAI embedding auto-configuration。
      # GoogleGenAiTextEmbeddingAutoConfiguration 的 matchIfMissing=true 會在屬性缺失時自動建立 bean，
      # 導致與 SearchConfig.noOpEmbeddingModel 衝突（NoUniqueBeanDefinitionException）。
      # 設為 none（非 google-genai）可防止 auto-config 建立 bean；改用 NoOpEmbeddingModel。
      embedding:
        text: none

  cloud:
    gcp:
      # 本機無 GCP 憑證，停用所有 GCP autoconfiguration 以避免啟動失敗。
      # GCP 服務（GCS / Firestore native SDK）改由 gcp profile 啟用。
      storage:
        enabled: false
      firestore:
        enabled: false

# =============================================================================
# 本地基礎設施配置 — Docker Compose（pgvector + mock-oauth2-server）
# =============================================================================
# Profile: local
# 用途: 本機開發 infra 層 — 只管「在本機跑哪些服務 / 哪些 GCP autoconfig 要關」。
#       env-specific 值（DB url/帳密、bucket、issuer-uri 等）一律由 behavior
#       profile 提供（dev profile 對應 local Compose 的具體值）。
#
# 建議組合: local,dev（./gradlew bootRun 預設）
#          local,lab / local,prod 也可，須自備該行為對應的 IdP / DB 等實際值。
#
# 多 local 環境支援:
#   不同本機環境若 DB 不同（port、container 名等），各自寫成不同 behavior profile
#   即可（如 application-dev2.yaml），共用此 local infra 層。
# =============================================================================

spring:
  # Spring Boot Docker Compose 整合預設行為：
  #   - compose.yaml 存在於 working dir 時自動 enabled=true
  #   - lifecycle-management 預設 start-and-stop：啟動 up、shutdown 跑 `docker compose down`
  #     （不帶 -v，named volume 保留 — pgvector-data 跨 session 持久）
  # 不寫任何 spring.docker.compose.* — 預設行為已符合 dev 需求；
  # bare-metal local（不用 Compose）的 dev 透過 SPRING_DOCKER_COMPOSE_ENABLED=false 關閉

  # 本機無 GCP 憑證，排除 GcpContextAutoConfiguration 避免 startup 嘗試偵測 project ID 噴 warning
  # 注：spring-ai-google-genai-embedding 是 core artifact（無 -starter-），classpath 上沒有
  # GoogleGenAiEmbeddingConnectionAutoConfiguration 類，無需 exclude
  autoconfigure:
    exclude:
      - com.google.cloud.spring.autoconfigure.core.GcpContextAutoConfiguration

  cloud:
    gcp:
      # 本機無 GCP 憑證，停用 GCP 服務
      storage:
        enabled: false
      # spring-cloud-gcp-starter-secretmanager 走 sm@ resolver；本機無 GCP 憑證明確 disable
      # 避免 startup 嘗試連 SM API
      secretmanager:
        enabled: false

# =============================================================================
# Skills Hub — 基礎共用配置
# =============================================================================
# 此檔案包進 Docker Image，包含所有環境共用的配置。
# 預設值接近正式環境，開發者需要的功能在 config/application-dev.yaml 開啟。
# 環境特定配置透過 profile 檔案覆蓋（基礎設施 × 行為 雙層 profile 設計）：
#
#   基礎設施 profile（src/main/resources/）：
#     local   — Docker Compose（本機開發，預設）
#     gcp     — GCP 服務（Cloud Run 部署）
#
#   行為 profile（config/，Spring Boot 外部配置目錄）：
#     dev     — 開發行為（DEBUG log、完整 actuator、springdoc、引入 secrets）
#     prod    — 正式行為（INFO log、限縮 actuator）
#
# 啟動範例：
#   本機開發：./gradlew bootRun              → 自動套用 local,dev
#   GCP 部署：SPRING_PROFILES_ACTIVE=gcp,prod
# =============================================================================

spring:
  application:
    name: skillshub

  profiles:
    # 預設套用 local（Docker Compose）+ dev（開發行為），
    # 讓 ./gradlew bootRun 不需任何額外參數即可啟動
    default: local,dev

  # ----- MongoDB（Spring Boot 4.0 起 spring.data.mongodb.* 已 deprecated，改用 spring.mongodb.*）-----
  mongodb:
    uri: mongodb://localhost:27017/skillshub
    database: skillshub

  data:
    mongodb:
      # Firestore 不支援透過 MongoDB wire protocol 建立 index（createIndex 命令不受支援）。
      # Composite index 必須在 Firestore Console 或 gcloud CLI 手動建立，
      # 因此停用 Spring Data 自動建立 index，避免啟動時報錯。
      # 注意：auto-index-creation 仍在 spring.data.mongodb 命名空間（spring-boot-data-mongodb 模組）。
      auto-index-creation: false

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  threads:
    virtual:
      enabled: true

  # ----- OAuth2 Resource Server (S011) -----
  # issuer-uri 為 base default，指向 backend/compose.yaml 啟動的 mock-oauth2-server。
  # `application-gcp.yaml` 之後可覆寫為企業 IdP。Spring Security 7 採 lazy discovery，
  # 即使 mock 容器尚未 ready，bootRun 仍可正常啟動（首個 JWT 請求才連線）。
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9000/skills-hub-dev

# ----- Actuator（基礎曝露，各環境 profile 可擴充） -----
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true

# ----- 日誌（根預設 INFO，dev profile 會對應用套用 DEBUG） -----
logging:
  level:
    root: INFO

# ----- API 文件（正式預設關閉，config/application-dev.yaml 開啟） -----
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

# ----- 應用程式自訂屬性（純值，不用 ${...} placeholder） -----
# Relaxed binding 自動支援 env var 覆蓋：
#   SKILLSHUB_STORAGE_BUCKET → skillshub.storage.bucket
#   SKILLSHUB_SEARCH_VECTOR_STORE → skillshub.search.vector-store
#   SKILLSHUB_GENAI_API_KEY → skillshub.genai.api-key
skillshub:
  storage:
    bucket: skillshub-packages
  search:
    vector-store: simple
    collection: skill_embeddings
  genai:
    model: gemini-embedding-2
    dimensions: 768
    # api-key 不在此設定 — 缺席即停用（NoOp fallback）
    # 本機開發：config/application-secrets.properties 注入 skillshub.genai.api-key=AIzaSy...
    # 雲端部署：env var SKILLSHUB_GENAI_API_KEY（relaxed binding 自動對應）

  # ----- OAuth 開關 + LAB 模式 (S012) -----
  # oauth.enabled=true（預設）走 S011 完整 OAuth Resource Server 鏈路。
  # LAB 環境設 false（用 env var SKILLSHUB_SECURITY_OAUTH_ENABLED=false 最直接），
  # SecurityFilterChain 走 LAB 分支：JwtDecoder bean 不建立、anyRequest permitAll、
  # LabSecurityFilter 注入 lab user (principal=lab-user, authorities=[ROLE_admin])。
  security:
    oauth:
      enabled: true
    lab:
      user-id: lab-user

  # ----- 多引擎安全掃描 Pipeline (S010) -----
  # 每個引擎可獨立開關；關閉的引擎 bean 不建立、不出現在 SARIF runs[]、
  # 也不參與 max-severity 彙整。Engine bean 透過 @ConditionalOnProperty 控制。
  scanner:
    engines:
      pattern:
        enabled: true     # PatternScanner — 靜態規則匹配（rm -rf、pipe-to-shell、敏感路徑）
      secret:
        enabled: true     # SecretScanner — API key / token / private key 偵測 + 遮罩
      metadata:
        enabled: true     # MetadataValidator — agentskills.io frontmatter 規則
      llm:
        enabled: false    # LlmJudge — base profile 預設關閉（避免本機 API call cost）；gcp profile 開啟
      meta:
        enabled: true     # MetaAnalyzer — 跨引擎合併規則（不調 LLM）

# =============================================================================
# Skills Hub — 基礎共用配置
# =============================================================================
# 此檔案包進 Docker Image，包含所有環境共用的配置。
# 預設值接近正式環境，開發者需要的功能在 config/application-dev.yaml 開啟。
# 環境特定配置透過 profile 檔案覆蓋（基礎設施 × 行為 雙層 profile 設計）：
#
#   基礎設施 profile（src/main/resources/）：
#     local   — Docker Compose（本機開發，預設）
#     gcp     — GCP 服務（Cloud Run 部署）
#
#   行為 profile（config/；prod / lab 由 build.gradle.kts processResources 拷進 image）：
#     dev     — 開發行為（DEBUG log、完整 actuator、引入 secrets；本地專用，不拷進 image）
#     prod    — 正式行為（INFO log、限縮 actuator；隨 image ship）
#     lab     — 封測 / MVP 行為（OAuth off、完整 actuator、DEBUG app log；隨 image ship）
#
# Profile 順序慣例：behavior 先、infra 後（行為 profile 先把基礎設定就位，
# infra profile 再覆蓋 GCP 專屬項，例如 sm@ 機制需 application-gcp.yaml 啟用）
#
# 啟動範例（Spring property 名 dot.lower.case；shell 環境變數 = SCREAMING_SNAKE 等價）：
#   本機開發：./gradlew bootRun                       → 自動套用 local,dev
#   GCP 封測：spring.profiles.active=lab,gcp          （Cloud Run env 名直接走 dot 形式）
#   GCP 正式：spring.profiles.active=prod,gcp
# =============================================================================

spring:
  application:
    name: skillshub

  profiles:
    # 預設套用 local（Docker Compose）+ dev（開發行為），
    # 讓 ./gradlew bootRun 不需任何額外參數即可啟動
    default: local,dev

  # ----- PostgreSQL（S014 起為唯一儲存層）-----
  # DataSource skeleton：3 個變數由 behavior profile (dev / lab / prod) 提供：
  #   skillshub.db.url      — JDBC URL (含 db name + 連線參數)
  #   skillshub.db.user     — DB user
  #   skillshub.db.password — DB 密碼（local: application-secrets.properties；
  #                                    GCP: Cloud Run env var 注 ${sm@<secret-id>} URI，
  #                                    Spring PropertyResolver 啟動時遞迴 resolve）
  #
  # Hikari 跨 env 通用設定（timing / liveness）寫於此；maximum-pool-size 由各 env
  # 依 DB tier 在 behavior profile override（dev=10 / lab,prod db-f1-micro=3）。
  # Flyway 預設 enabled=true / locations=classpath:db/migration / baseline-on-migrate=false 不寫。
  datasource:
    url: ${skillshub.db.url}
    username: ${skillshub.db.user}
    password: ${skillshub.db.password}
    hikari:
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      # HikariCP 4.0+ 主動偵測：對 idle in pool 的 connection 每 2 分鐘 isValid()
      keepalive-time: 120000
      leak-detection-threshold: 60000

  servlet:
    multipart:
      max-file-size: 10MB    # 預設 1MB；上傳 skill zip 包要放寬
      # max-request-size 預設已是 10MB，不重複寫

  threads:
    virtual:
      enabled: true

  # ----- Spring Modulith Event Publication Registry (S023) -----
  # 啟用 transactional outbox：@ApplicationModuleListener 觸發時，event_publication 表
  # 在 publisher TX 內 INSERT；listener 在 AFTER_COMMIT 新 TX async 執行；失敗 row
  # 留 status='FAILED'，由 IncompleteEventRepublishTask scheduled retry 重投。
  # 詳見 ADR-002 + docs/deepwiki/spring-data-jdbc-modulith/event-publication-registry.md
  modulith:
    events:
      jdbc:
        schema-initialization:
          # 由 Flyway V4 管 schema，starter auto-init 關閉避免衝突（陷阱 9）
          enabled: false
      # 多 instance 部署改用 ShedLock + IncompleteEventRepublishTask 排程 retry（陷阱 7）
      # 啟動時不自動 republish，避免多 instance 同時觸發風暴
      republish-outstanding-events-on-restart: false
      # Staleness monitor — 卡住的 PROCESSING / PUBLISHED row 達閾值即標 FAILED
      # 由 monitor scheduled task 處理；不重試，只標註，由 retry task 後續重投
      staleness:
        published: 60m
        processing: 30m

  # ----- OAuth2 Resource Server (S011) -----
  # issuer-uri 由各 profile 自行宣告（不放 base 避免 localhost mock 變成預設）：
  #   local — backend/compose.yaml mock-oauth2-server
  #   lab   — application-lab.yaml（部署人員填）
  #   prod  — application-prod.yaml（部署人員填）
  # Spring Security 7 採 lazy discovery，issuer 未設定 / 不可達 仍能啟動，首個 JWT 請求才探。

  # ----- 錯誤回應安全（S045）-----
  # 未被 GlobalExceptionHandler 攔截的錯誤（如 415 / unknown path 404）會落 Spring
  # 預設 BasicErrorController。Spring Boot 4 預設已關 trace / exception / binding-errors，
  # 只剩 message 預設 never — 此處顯式打開 always 給前端轉譯。
  # 注意：Spring Boot 4 將 `server.error.*` 重命名為 `spring.web.error.*`，沿用舊前綴
  # yaml parse 不報錯但不生效。
  web:
    error:
      include-message: always

# ----- Actuator（基礎曝露，各環境 profile 可擴充） -----
# S023：加入 modulith endpoint 暴露模組依賴關係 + event publication 統計（給 ops dashboard）
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,modulith
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true

# ----- 日誌：root 預設 INFO 即可（不重複寫）；dev / lab profile 對應用 package 套 DEBUG -----

# ----- 應用程式自訂屬性 -----
# 預設值大多由 SkillshubProperties.java @DefaultValue 提供（base 不重複寫 yaml）：
#   OAuth.enabled = true（fail-secure；dev profile override false）
#   Storage.bucket = "skillshub-packages"（每 env 應顯式覆蓋）
#   Lab.userId    = "lab-user"（only meaningful when oauth.enabled=false）
#   Search.collection = "skill_embeddings"
#   GenAI.model = "gemini-embedding-2" / GenAI.dimensions = 768 / GenAI.apiKey = null
#   Scanner.Engines.{pattern,secret,metadata,llm,meta}.enabled = true（5 引擎全 default true）
# 環境特定值由 behavior profile 提供（dev / lab / prod 各自覆蓋）。
skillshub:
  # ----- Scheduled retry / republish (S023) -----
  # IncompleteEventRepublishTask 用此設定 fixedDelay 與 olderThan threshold；
  # ShedLock 互斥於多 Cloud Run instance（per ADR-002 + S023 §4.5）
  scheduler:
    republish-delay: PT1M       # 每分鐘檢查一次
    republish-older-than: PT5M  # 只重投 5 分鐘前還沒完成的（避免追平正在處理的）

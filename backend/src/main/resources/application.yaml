# =============================================================================
# Skills Hub — 基礎共用配置
# =============================================================================
# 此檔案包進 Docker Image，包含所有環境共用的配置。
# 預設值接近正式環境，開發者需要的功能在 config/application-dev.yaml 開啟。
# 環境特定配置透過 profile 檔案覆蓋（基礎設施 × 行為 雙層 profile 設計）：
#
#   基礎設施 profile（src/main/resources/）：
#     local   — Docker Compose（本機開發，預設）
#     gcp     — GCP 服務（Cloud Run 部署）
#
#   行為 profile（config/，Spring Boot 外部配置目錄）：
#     dev     — 開發行為（DEBUG log、完整 actuator、springdoc、引入 secrets）
#     prod    — 正式行為（INFO log、限縮 actuator）
#
# 啟動範例：
#   本機開發：./gradlew bootRun              → 自動套用 local,dev
#   GCP 部署：SPRING_PROFILES_ACTIVE=gcp,prod
# =============================================================================

spring:
  application:
    name: skillshub

  profiles:
    # 預設套用 local（Docker Compose）+ dev（開發行為），
    # 讓 ./gradlew bootRun 不需任何額外參數即可啟動
    default: local,dev

  # ----- PostgreSQL（S014 起為唯一儲存層）-----
  # local profile 由 Docker Compose 服務注入連線（service-connection label）；
  # gcp profile 由 application-gcp.yaml 覆寫（Cloud SQL Auth Proxy sidecar — 同條 JDBC URL）。
  datasource:
    url: jdbc:postgresql://localhost:5432/mydatabase
    username: myuser
    password: secret
    hikari:
      maximum-pool-size: 10
  flyway:
    enabled: true
    baseline-on-migrate: false
    locations: classpath:db/migration

  # ----- Spring AI 向量儲存（T8）-----
  # T8 改 spring-ai-pgvector-store core artifact + 自寫 SkillshubPgVectorStore 子類
  # （per-request builder 模式；§4.14 / §2.1 決策 #2/#12 修訂），不走 starter auto-config
  # → 完全無 spring.ai.vectorstore.pgvector.* 設定，所有 wiring 由子類 constructor 寫死
  # （HNSW + cosine + 6-欄 INSERT；Flyway V1 schema 已建表）。

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  threads:
    virtual:
      enabled: true

  # ----- Spring Modulith Event Publication Registry (S023) -----
  # 啟用 transactional outbox：@ApplicationModuleListener 觸發時，event_publication 表
  # 在 publisher TX 內 INSERT；listener 在 AFTER_COMMIT 新 TX async 執行；失敗 row
  # 留 status='FAILED'，由 IncompleteEventRepublishTask scheduled retry 重投。
  # 詳見 ADR-002 + docs/deepwiki/spring-data-jdbc-modulith/event-publication-registry.md
  modulith:
    events:
      jdbc:
        schema-initialization:
          # 由 Flyway V4 管 schema，starter auto-init 關閉避免衝突（陷阱 9）
          enabled: false
      # 多 instance 部署改用 ShedLock + IncompleteEventRepublishTask 排程 retry（陷阱 7）
      # 啟動時不自動 republish，避免多 instance 同時觸發風暴
      republish-outstanding-events-on-restart: false
      # Staleness monitor — 卡住的 PROCESSING / PUBLISHED row 達閾值即標 FAILED
      # 由 monitor scheduled task 處理；不重試，只標註，由 retry task 後續重投
      staleness:
        published: 60m
        processing: 30m

  # ----- OAuth2 Resource Server (S011) -----
  # issuer-uri 為 base default，指向 backend/compose.yaml 啟動的 mock-oauth2-server。
  # `application-gcp.yaml` 之後可覆寫為企業 IdP。Spring Security 7 採 lazy discovery，
  # 即使 mock 容器尚未 ready，bootRun 仍可正常啟動（首個 JWT 請求才連線）。
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9000/skills-hub-dev

# ----- Actuator（基礎曝露，各環境 profile 可擴充） -----
# S023：加入 modulith endpoint 暴露模組依賴關係 + event publication 統計（給 ops dashboard）
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,modulith
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true

# ----- 日誌（根預設 INFO，dev profile 會對應用套用 DEBUG） -----
logging:
  level:
    root: INFO

# ----- API 文件（正式預設關閉，config/application-dev.yaml 開啟） -----
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

# ----- 應用程式自訂屬性（純值，不用 ${...} placeholder） -----
# Relaxed binding 自動支援 env var 覆蓋：
#   SKILLSHUB_STORAGE_BUCKET → skillshub.storage.bucket
#   SKILLSHUB_GENAI_API_KEY → skillshub.genai.api-key
skillshub:
  storage:
    bucket: skillshub-packages
  search:
    # T8 後唯一 backend 為自寫 SkillshubPgVectorStore 子類；無 vector-store 切換屬性。
    collection: skill_embeddings
  genai:
    model: gemini-embedding-2
    dimensions: 768
    # api-key 不在此設定 — 缺席即停用（NoOp fallback）
    # 本機開發：config/application-secrets.properties 注入 skillshub.genai.api-key=AIzaSy...
    # 雲端部署：env var SKILLSHUB_GENAI_API_KEY（relaxed binding 自動對應）

  # ----- OAuth 開關 + LAB 模式 (S012) -----
  # oauth.enabled=true（預設）走 S011 完整 OAuth Resource Server 鏈路。
  # LAB 環境設 false（用 env var SKILLSHUB_SECURITY_OAUTH_ENABLED=false 最直接），
  # SecurityFilterChain 走 LAB 分支：JwtDecoder bean 不建立、anyRequest permitAll、
  # LabSecurityFilter 注入 lab user (principal=lab-user, authorities=[ROLE_admin])。
  security:
    oauth:
      enabled: true
    lab:
      user-id: lab-user

  # ----- Scheduled retry / republish (S023) -----
  # IncompleteEventRepublishTask 用此設定 fixedDelay 與 olderThan threshold；
  # ShedLock 互斥於多 Cloud Run instance（per ADR-002 + S023 §4.5）
  scheduler:
    republish-delay: PT1M       # 每分鐘檢查一次
    republish-older-than: PT5M  # 只重投 5 分鐘前還沒完成的（避免追平正在處理的）

  # ----- 多引擎安全掃描 Pipeline (S010) -----
  # 每個引擎可獨立開關；關閉的引擎 bean 不建立、不出現在 SARIF runs[]、
  # 也不參與 max-severity 彙整。Engine bean 透過 @ConditionalOnProperty 控制。
  scanner:
    engines:
      pattern:
        enabled: true     # PatternScanner — 靜態規則匹配（rm -rf、pipe-to-shell、敏感路徑）
      secret:
        enabled: true     # SecretScanner — API key / token / private key 偵測 + 遮罩
      metadata:
        enabled: true     # MetadataValidator — agentskills.io frontmatter 規則
      llm:
        enabled: false    # LlmJudge — base profile 預設關閉（避免本機 API call cost）；gcp profile 開啟
      meta:
        enabled: true     # MetaAnalyzer — 跨引擎合併規則（不調 LLM）

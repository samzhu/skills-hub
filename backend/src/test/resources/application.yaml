spring:
  # S014: 測試 datasource 由 @ServiceConnection（PostgreSQLContainer）動態注入；
  # 此處只設 Flyway 預設 — 個別測試（如 MapJsonbConverterTest）可用
  # @TestPropertySource("spring.flyway.enabled=false") 關閉以隔離。
  flyway:
    enabled: true
    locations: classpath:db/migration

  # T8: 不再需要 spring.ai.vectorstore.pgvector.* 設定（自寫 SkillshubPgVectorStore
  # constructor 內部寫死），保留 spring.ai.model.* 為阻擋 GoogleGenAi auto-config
  # 與 SearchConfig.noOpEmbeddingModel 衝突。
  ai:
    model:
      # Prevent GoogleGenAiTextEmbeddingAutoConfiguration from creating googleGenAiTextEmbedding bean.
      # Its matchIfMissing=true would otherwise conflict with SearchConfig.noOpEmbeddingModel.
      embedding:
        text: none
      # Same reasoning for chat: ScannerAiConfig (S010) handles ChatModel manually.
      # `spring.ai.model.chat: none` gates `GoogleGenAiChatAutoConfiguration`'s ConditionalOnProperty.
      chat: none

  autoconfigure:
    exclude:
      # GoogleGenAiEmbeddingConnectionAutoConfiguration requires project-id at startup (no @ConditionalOnProperty),
      # so exclude it when GCP credentials are not available (local / test environments).
      - org.springframework.ai.model.google.genai.autoconfigure.embedding.GoogleGenAiEmbeddingConnectionAutoConfiguration

  cloud:
    gcp:
      core:
        enabled: false
      storage:
        enabled: false
      # T01 (S135a) discovered drift: spring-cloud-gcp-starter-secretmanager 在 commit 2155a3f
      # (Cloud Run deploy) 引入但 test profile 漏 disable，造成所有 @SpringBootTest context load
      # 失敗 (NoSuchBeanDefinitionException: CredentialsProvider in GcpSecretManagerAutoConfiguration)。
      # 對齊既有 core/storage 模式 disable 之。
      secretmanager:
        enabled: false

skillshub:
  quality:
    judge:
      # S135a: disable real QualityJudge in test; StubQualityJudge (test classpath) fills the slot.
      enabled: false

# Gradle daemon JVM args — Spring Boot 4 + Modulith + AOT processing 需 ≥ 2g heap
# 預設 -Xmx512m 在 processTestAot + 18 SpringBootTest contexts 下會 GC thrash daemon stop
# 官方推薦 (https://docs.gradle.org/current/userguide/build_environment.html)：
#   org.gradle.jvmargs=-Xmx2g -XX:MaxMetaspaceSize=512m
# 注意：本 setting 只影響 daemon；test worker heap 由 tasks.test { maxHeapSize = "3g" } 控制。
org.gradle.jvmargs=-Xmx2g -XX:MaxMetaspaceSize=512m

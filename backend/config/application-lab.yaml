# =============================================================================
# LAB 環境行為配置 — 封測 / MVP（搭配 GCP infra）
# =============================================================================
# Profile: lab
# 用途: GCP Cloud Run 上跑 LAB / 封測 / MVP；OAuth 走 real IdP；提供 lab 環境
#       具體值（DB / bucket / IdP / secret 名稱 / pool 大小等）。
#
# 啟動: spring.profiles.active=lab,gcp（順序：behavior 先、infra 後）
#       Cloud Run env 名直接走 dot；shell 環境變數用 SPRING_PROFILES_ACTIVE 等價
#
# 部署註: 此檔由 backend/build.gradle.kts processResources 拷進 image classpath，
#         Cloud Run 啟動可載入（dev / secrets properties 維持本地專用，不拷）。
# =============================================================================

spring:
  # ----- DataSource pool-size override（base 帶 url/user/password placeholder + 通用 timing） -----
  # 其他 hikari 設定 (timeout/lifetime/keepalive/leak-detection) 在 base 已設好
  datasource:
    hikari:
      # db-f1-micro: max_connections=25 - 5 reserved = 20 / 5 instance ≈ 4 → 取 3 留 buffer
      maximum-pool-size: 3
      minimum-idle: 1
      # S114c: Cloud SQL Auth Proxy 暖機最多 ~30s；60s 避免 cold-start 假死
      initialization-fail-timeout: 60000

  # ----- OAuth2 Resource Server + Client：Google OIDC（per S139 §4.6）-----
  # Resource Server JWT：驗 id_token 用（OAuth2 Login flow 內部）。
  # ⚠ Caveat：Google access_token 是 opaque（非 JWT），打到 Resource Server 的 bearer
  # 會 decode fail；MVP 僅靠 session cookie 認證（OAuth2 Login flow 建立的）。
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${skillshub.oauth.issuer-uri:}
      # ----- OAuth2 Client (S139 — server-side login on LAB) -----
      # client-id / client-secret 由 service.yaml 從 Secret Manager 注入：
      #   spring.security.oauth2.client.registration.skillshub.client-id     ← sm@skillshub-oauth-client-id
      #   spring.security.oauth2.client.registration.skillshub.client-secret ← sm@skillshub-oauth-client-secret
      # 不在 yaml 寫死避免 secret leak（同 db.password 模式）
      #
      # redirect-uri：portable 預設用 {baseUrl} URI template（Spring Security 從 request
      # URL 解析）；但 Cloud Run 把 https termination 在 proxy 端，容器看到的 request 是
      # http://localhost:8080 → {baseUrl} 解析錯誤。LAB 部署改由 service.yaml env var
      # 寫死外部 URL 覆蓋此預設（含 project number 屬部署敏感資訊，故不寫進 git）。
      client:
        registration:
          skillshub:
            scope: openid,email,profile                   # Google OIDC：openid 取 id_token、email/profile 取 claim
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            client-authentication-method: client_secret_basic
            authorization-grant-type: authorization_code
        provider:
          skillshub:
            issuer-uri: https://accounts.google.com       # Google OIDC discovery（無 trailing slash）

# ----- LAB env 應用屬性 -----
skillshub:
  # ----- OAuth: 啟用 OAuth2 Login chain；issuer-uri 對齊 Resource Server 引用 -----
  # security.oauth.enabled 沿用 Java default true（Resource Server JWT chain）；
  # security.oauth.login.enabled 顯式 true → SecurityConfig 加掛 oauth2Login() chain +
  # AuthRedirectConfig 處理 returnTo state（per S139 T01）。
  oauth:
    issuer-uri: https://accounts.google.com
  security:
    oauth:
      login:
        enabled: true

  # ----- DataSource 變數 — Cloud SQL via Auth Proxy sidecar -----
  # url: 與 prod 相同 URL pattern（差異只在 db name 由 env var 覆蓋）
  # user / password: 不在 yaml 寫死；由 Cloud Run env var 注入
  #   skillshub.db.user      — service.yaml 注 literal 值（${DB_USER}）
  #   skillshub.db.password  — service.yaml 注 ${sm@skillshub-db-password} URI
  #                            Spring 啟動時遞迴 resolve 至 Secret Manager 實際值
  db:
    url: jdbc:postgresql://localhost:5432/${skillshub.db.name:skillshub}?ApplicationName=skillshub&currentSchema=public&reWriteBatchedInserts=true&socketTimeout=30

  # GCS bucket — 部署時由 service.yaml 內 skillshub.storage.bucket env var 覆蓋實際 bucket 名
  # （Cloud Run env var > yaml，runtime 一定吃 env 值；yaml 寫的是 fallback default 給
  # AOT build 階段 + dev sanity check 用）。
  # 不寫成 ${skillshub.storage.bucket:default} self-reference — AOT 階段沒 env var 會
  # circular placeholder fail；env override 不需靠 placeholder，Spring 屬性優先序自動處理。
  storage:
    bucket: skillshub-packages-lab

  # Gemini API key 走統一注入：
  #   - Cloud Run env var skillshub.genai.api-key=${sm@skillshub-genai-api-key} 遞迴 resolve
  #   - 本機 application-secrets.properties skillshub.genai.api-key=AIzaSy... 直接注入
  # 不重複寫 yaml — @ConfigurationProperties relaxed binding 自動完成

  # LlmJudge engine 預設 enabled=true（Java @DefaultValue），不重複寫

# ----- 完整 actuator 暴露（封測 QA 診斷需要） -----
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,env,configprops,beans,mappings,modulith

# ----- 開啟 API 文件（QA 探索 API） -----
springdoc:
  api-docs:
    enabled: true
    version: openapi_3_1
  swagger-ui:
    enabled: true

# ----- 應用 DEBUG 便於 LAB 報錯重現；framework 維持 INFO（root 預設）-----
logging:
  level:
    io.github.samzhu.skillshub: DEBUG
